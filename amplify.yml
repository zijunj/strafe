version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -e VLR_API_BASE_URL >> .env.production
        - env | grep -e NEXT_PUBLIC_SUPABASE_URL >> .env.production
        - env | grep -e NEXT_PUBLIC_SUPABASE_ANON_KEY >> .env.production
        - env | grep -e SUPABASE_SERVICE_ROLE_KEY >> .env.production
        - env | grep -e OPENAI_API_KEY >> .env.production
        - env | grep -e AI_SYNC_SECRET >> .env.production
        - env | grep -e APP_BASE_URL >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
